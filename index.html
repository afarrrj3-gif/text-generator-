<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Text Randomizer</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

h1{
text-align:center;
color:#38bdf8;
}

.box{
background:#1e293b;
padding:20px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
margin-top:20px;
}

#text{
white-space:pre-wrap;
line-height:1.6;
font-size:15px;
}

.controls{
text-align:center;
margin-top:15px;
}

button{
background:#0ea5e9;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0284c7;
}

.timerbox{
text-align:center;
margin-top:15px;
}

input{
padding:6px;
border-radius:6px;
border:none;
width:60px;
text-align:center;
}

.popup{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#0ea5e9;
padding:10px 20px;
border-radius:20px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Text Randomizer</h1>

<div class="box">
<div id="text"></div>
</div>

<div class="controls">

<button onclick="copyText()">📋 Salin</button>
<button onclick="generate()">🔄 Generate</button>
<button onclick="toggle()">⏯ Start / Pause</button>

</div>

<div class="timerbox">

Timer :
<input type="number" id="timerInput" value="3" min="1" max="30"> detik
<button onclick="updateTimer()">Apply</button>

</div>

</div>

<div class="popup" id="popup">✅ Tersalin</div>

<script>

const titleWords=[
"THE KING AMANAH",
"THE KING OFFICIAL",
"THE KING SULTAN",
"THE KING TRUSTED",
"THE KING LEGIT"
]

const rhyme1=[
"UBUR UBUR IKAN LELE",
"IKAN LELE DI KOLAM",
"UBUR UBUR DI LAUT",
"IKAN LELE DI EMPANG"
]

const rhyme2=[
"JOIN DONG LE",
"GAS JOIN LE",
"MASUK SINI LE",
"JOIN SINI LE"
]

const symbols=["✨","🔥","⚡","💎","👑","🚀","🌟"]

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generate(){

const text=`
${random(titleWords)} ${random(symbols)} بِسۡـــــــــمِ ٱللهِ ٱلرَحۡـمَـٰنِ ٱلرَحِـــــــيم

${random(rhyme1)}
${random(rhyme2)}

[ 1 ] GRUP BUYER SULTAN
https://chat.whatsapp.com/E9wCodL7tWK47qMfvbDH51?mode=hqrc

SALURAN ML
https://whatsapp.com/channel/0029VbB5xTP3GJOzlxzCl20S

SALURAN FF
https://whatsapp.com/channel/0029Vb6TFJAFy72Jy6JIpv0m
`

document.getElementById("text").innerText=text

}

function copyText(){

const text=document.getElementById("text").innerText
navigator.clipboard.writeText(text)

const popup=document.getElementById("popup")
popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},1500)

}

let interval=3000
let running=true
let generator=setInterval(run,interval)

function run(){
if(running) generate()
}

function toggle(){
running=!running
}

function updateTimer(){

const value=document.getElementById("timerInput").value

interval=value*1000

clearInterval(generator)

generator=setInterval(run,interval)

}

generate()

</script>

</body>
</html>
